name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kivy/buildozer-action@master
        with:
          command: buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: 8DStud-App
          path: bin/*.apk
