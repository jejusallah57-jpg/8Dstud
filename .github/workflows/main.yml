name: Build 8DStud APK

on: 
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: yes | buildozer android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/actions/upload-artifact@v4
        with:
          name: 8DStud-APK
          path: bin/*.apk
